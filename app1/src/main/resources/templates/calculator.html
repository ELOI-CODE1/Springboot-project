<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Calculator</title>
    </head>
    <style>
        body{
            padding-top: 20px;
            padding-left: 200px;
            max-width: 800px;
            margin: 50px auto;
            border-radius: 8px;
            background-color: rgb(106, 189, 117);
            border: 1px solid rgb(16, 22, 16);
        }
        h1{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 46px;
        }
        p{
            font-family: 'Courier New', Courier, monospace;
            font-size: 30px;
            font-weight: bold;
        }
        input, button{
            padding: 10px;
            margin: 10px 0;
        }
        button{
            border: none;
            color: blue;
            background-color: beige;
            cursor: pointer;
        }
        button:hover{
            background-color: black;
            color: white;
        }
        .result-box{
            margin-top: 20px;
            background-color: white;
            color: black;
            padding: 10px;
            border-radius: 10px;
            max-width: fit-content;
            margin-bottom: 10px;
        }
        .backButton{
            text-decoration: none;
            font-family: 'Courier New', Courier, monospace;
            border: 1px solid green;
            background-color: greenyellow;
            color: black;
            font-size: larger;
            font-weight: bold;
            margin-left: 20%;
        }
        .backButton:hover{
            background-color: green;
            color: white;
            cursor: pointer;
        }
    </style>
    <body>
        <h1>Calculator</h1>
        <p>Calculator for adding 2 numbers</p>
        <form action="/calculate" method="post">
            <input type="number" name="num1" placeholder="Enter in first number" th:value="${number1}" required>
            <input type="number" name="num2" placeholder="Enter in second number" th:value="${number2}" required>
            <button type="submit">ADD</button>
        </form>
        <div class="result-box" th:if="${total != null}">
            <strong>Result: </strong>
            <span th:text="|${number1}  +  ${number2}  =  ${total}|">0</span><br><br>
            <a href="/" class="backButton">GO BACK</a>
        </div>
    </body>
</html>
